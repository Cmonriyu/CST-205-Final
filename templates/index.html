<!-- Written By Daniel and Riyu, Base stuff, Aesthetically reformatted by Riyu using Phoenix themes. -->

<!DOCTYPE html>
<html>
<head>
    <title>Culture and Food Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/wheel.css') }}">
    <style>
        h1 {
            text-align: center;
            padding: 25px;
            font-family: 'Courier New', Courier, monospace;
            background-color: aliceblue;
        }
    </style>
    {{ bootstrap.load_css() }}
</head>

<!-- Base Title and Headings -->
<!-- Buttons and integration of Dayshauns Wheel -->
<body style="background-color: burlywood;">

    <h1>Culture and Food Finder</h1>

    <p style="font-family: 'Courier New', Courier, monospace;">Choose a culture to see foods from that area.</p>

    <img src="{{ url_for('static', filename='images/food1.jpg') }}" width="900">

    <form action="/foods" method="post">
        <p>
            Select a culture:
            <div id="wheel-container">
                <div id="wheel">
                    {% for area in areas %}
                        <div class="option" data-value="{{ area }}">{{ area }}</div>
                    {% endfor %}
                </div>
            </div>
            <button type="button" id="spin">Spin Random</button>
            <input type="hidden" name="area" id="selected-area">
        </p>

        <p>
            <input type="submit" value="Show Foods">
        </p>
        <p>
            <a href="{{url_for('history')}}" class="btn btn-info"
            style="color:white; background-color: burlywood; border-color:burlywood"
            >View history</a>
        </p>        
        
    </form>
    

    <script src="{{ url_for('static', filename='js/wheel.js') }}"></script>
</body>
</html>
